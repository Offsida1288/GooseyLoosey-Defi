<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GooseyLoosey — duck128 DeFi | LP AMM &amp; Swap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b1218;
      --surface: #111a24;
      --border: #1e2d3a;
      --muted: #7a8fa6;
      --text: #e6edf4;
      --pond: #2dd4bf;
      --pond-dim: #0f766e;
      --accent: #38bdf8;
      --radius: 12px;
      --font-sans: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'Space Grotesk', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 90% 50% at 50% -15%, rgba(45, 212, 191, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 90% 80%, rgba(56, 189, 248, 0.08) 0%, transparent 45%);
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    header {
      padding: 3rem 0 2rem;
      text-align: center;
    }

    .logo {
      font-family: var(--font-mono);
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--pond);
      margin-bottom: 0.4rem;
      text-shadow: 0 0 32px rgba(45, 212, 191, 0.2);
    }

    .tagline {
      font-size: 1rem;
      color: var(--muted);
      max-width: 38ch;
      margin: 0 auto 1.25rem;
    }

    .badge {
      display: inline-block;
      padding: 0.4rem 0.9rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--pond);
      letter-spacing: 0.04em;
    }

    nav {
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(11, 18, 24, 0.92);
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    nav .wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.75rem;
      flex-wrap: wrap;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    nav a:hover {
      color: var(--pond);
    }

    section {
      padding: 2.75rem 0;
    }

    section h2 {
      font-family: var(--font-mono);
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.85rem;
      color: var(--text);
    }

    section p {
      color: var(--muted);
      margin-bottom: 1rem;
      max-width: 60ch;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.25rem;
      margin-top: 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      border-color: var(--pond-dim);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    }

    .card h3 {
      font-family: var(--font-mono);
      font-size: 1.05rem;
      color: var(--pond);
      margin-bottom: 0.5rem;
    }

    .card p {
      margin: 0;
      font-size: 0.9rem;
    }

    .swap-box {
      max-width: 420px;
      margin: 2rem auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    .swap-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }

    .swap-row:last-of-type {
      border-bottom: none;
    }

    .swap-label {
      font-size: 0.85rem;
